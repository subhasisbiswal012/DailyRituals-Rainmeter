[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Daily Rituals - Streak Tracker
Author=Subhasis Biswal
Version=1.0.0
License=MIT
Information=A warm amber/gold glassmorphism daily habit tracker for Rainmeter. Features include clickable habit check-offs with persistent streak counting, an overall streak counter for consecutive days with all habits completed, an edit mode for adding/removing rituals, a daily progress bar, and 30 rotating Bhagavad Gita motivational quotes (one per day). Supports up to 8 custom habits.

[Variables]
W=340
InputY=300
NewHabitInput=

[MeasureScript]
Measure=Script
ScriptFile=#@#StreakTracker.lua
UpdateDivider=5

[InputMeasure]
Measure=Plugin
Plugin=InputText
SolidColor=40,26,10,250
FontColor=250,199,117
FontFace=Segoe UI
FontSize=12
X=32
Y=#InputY#
W=240
H=26
DefaultValue=""
Command1=[!SetVariable NewHabitInput "$UserInput$"][!CommandMeasure MeasureScript "FinishAdd()"][!UpdateMeterGroup All][!Redraw]

